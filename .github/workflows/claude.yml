name: Claude Code

# Triggered when an issue or PR comment mentions @claude. The action reads
# the mention's context, runs Claude Code on a fresh branch, makes commits,
# and reports back via comments. Authed via OAuth token paired with
# Alexander's Claude.ai Max subscription (no separate API billing).
#
# Used as the dispatch mechanism for the PM-Claude orchestration plan in
# PLAN.md. Future Claude Code sessions running in this workflow will read
# CLAUDE.md, STYLE.md, data/SCHEMA.md, build/PROFILES.md, and PLAN.md as
# their required reading on session start, then perform whatever assignment
# is given in the issue body.

on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
